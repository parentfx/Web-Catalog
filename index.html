<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My WebCatalog</title>
    <style>
        :root {
            --bg-overlay: rgba(244, 247, 246, 0.85);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #2d3436;
            --accent: #0984e3;
            --blur: blur(12px);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-overlay: rgba(30, 39, 46, 0.85);
            --card-bg: rgba(47, 54, 64, 0.7);
            --text: #f5f6fa;
            --accent: #45aaf2;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            transition: color 0.3s;
            /* Dynamic Background from Unsplash */
            background: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
            transition: background 0.3s;
        }

        #theme-toggle {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 18px; cursor: pointer; border-radius: 30px;
            border: 1px solid var(--accent); background: var(--card-bg);
            color: var(--text); backdrop-filter: var(--blur);
            font-weight: 600; font-size: 0.8rem; transition: 0.2s;
        }

        /* Header & Weather */
        #clock-container { text-align: center; margin-bottom: 20px; }
        #time { font-size: 4rem; font-weight: 700; margin: 0; letter-spacing: -2px; }
        #date { font-size: 1.2rem; opacity: 0.8; margin-top: 5px; }

        #weather-wrapper {
            margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        #weather-icon { font-size: 2.5rem; }
        #weather-temp { font-weight: 700; font-size: 1.5rem; }
        #weather-desc { font-size: 0.9rem; text-transform: capitalize; opacity: 0.8; }

        /* Search */
        .search-container { width: 100%; max-width: 600px; margin: 30px 0 50px 0; }
        .search-bar {
            width: 100%; padding: 18px 30px; font-size: 1.1rem;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); 
            background: var(--card-bg); color: var(--text); 
            backdrop-filter: var(--blur); outline: none; box-shadow: var(--shadow);
        }

        /* Grid Layouts */
        .section-title {
            width: 100%; max-width: 850px; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin: 20px 0 15px 10px; opacity: 0.7; font-weight: 700;
        }

        .catalog-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px; width: 100%; max-width: 850px; margin-bottom: 40px;
        }

        .favorites-grid { grid-template-columns: repeat(3, 1fr); gap: 25px; }

        .app-card {
            background: var(--card-bg); padding: 25px 15px; border-radius: 24px;
            text-align: center; text-decoration: none; color: var(--text);
            backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
            box-shadow: var(--shadow);
        }
        .app-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.4); }
        body.dark-mode .app-card:hover { background: rgba(255,255,255,0.15); }

        .icon img { width: 40px; height: 40px; margin: 0 auto 12px; display: block; transition: 0.3s; }
        .favorites-grid .icon img { width: 55px; height: 55px; }
        body.dark-mode .icon img { filter: brightness(1.2); }
        .app-name { font-weight: 600; font-size: 0.9rem; }

        /* Notes Section */
        .notes-container { width: 100%; max-width: 850px; margin-bottom: 60px; }
        #notebook {
            width: 100%; height: 180px; padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg);
            color: var(--text); backdrop-filter: var(--blur); font-family: inherit;
            font-size: 1rem; resize: vertical; outline: none; box-shadow: var(--shadow);
            box-sizing: border-box; line-height: 1.5;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">🌙 Dark Mode</button>

    <div id="clock-container">
        <p id="time">00:00</p>
        <p id="date">Loading...</p>
        
        <div id="weather-wrapper">
            <span id="weather-icon">⌛</span>
            <span id="weather-temp">--°</span>
            <div id="weather-desc">Syncing weather...</div>
        </div>
    </div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" class="search-bar" placeholder="Search Google..." autocomplete="off">
        </form>
    </div>

    <div class="section-title">⭐ Top Favorites</div>
    <div class="catalog-grid favorites-grid">
        <a href="https://notion.so" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/notion/000000" alt="Notion"></div>
            <span class="app-name">Notion</span>
        </a>
        <a href="https://gmail.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/gmail/EA4335" alt="Gmail"></div>
            <span class="app-name">Mail</span>
        </a>
        <a href="https://youtube.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube"></div>
            <span class="app-name">YouTube</span>
        </a>
    </div>

    <div class="section-title">📱 Web Catalog</div>
    <div class="catalog-grid">
        <a href="https://github.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/github/181717" alt="GitHub"></div>
            <span class="app-name">GitHub</span>
        </a>
        <a href="https://canva.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/canva/00C4CC" alt="Canva"></div>
            <span class="app-name">Canva</span>
        </a>
        <a href="https://calendar.google.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/googlecalendar/4285F4" alt="Calendar"></div>
            <span class="app-name">Calendar</span>
        </a>
        <a href="https://spotify.com" class="app-card">
            <div class="icon"><img src="https://cdn.simpleicons.org/spotify/1DB954" alt="Spotify"></div>
            <span class="app-name">Spotify</span>
        </a>
    </div>

    <div class="section-title">📝 Quick Notes</div>
    <div class="notes-container">
        <textarea id="notebook" placeholder="Type reminders here... (Auto-saves to browser memory)"></textarea>
    </div>

    <script>
        // 1. Clock & Date
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Weather Logic (wttr.in)
        async function updateWeather() {
            try {
                const response = await fetch('https://wttr.in/?format=j1');
                const data = await response.json();
                const temp = data.current_condition[0].temp_C; 
                const desc = data.current_condition[0].weatherDesc[0].value;
                const code = data.current_condition[0].weatherCode;

                let icon = "☁️";
                if (code == "113") icon = "☀️";
                if (code == "116") icon = "⛅";
                if (code == "119" || code == "122") icon = "☁️";
                if (parseInt(code) >= 200) icon = "🌧️";

                document.getElementById('weather-temp').textContent = `${temp}°C`;
                document.getElementById('weather-desc').textContent = desc;
                document.getElementById('weather-icon').textContent = icon;
            } catch (e) { console.log("Weather error"); }
        }
        updateWeather();
        setInterval(updateWeather, 900000);

        // 3. Theme Toggle Persistence
        const btn = document.getElementById("theme-toggle");
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            btn.textContent = "☀️ Light Mode";
        }
        btn.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            btn.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
            localStorage.setItem("theme", isDark ? "dark" : "light");
        });

        // 4. Notebook Persistence
        const notebook = document.getElementById("notebook");
        notebook.value = localStorage.getItem("my-web-note") || "";
        notebook.addEventListener("input", () => {
            localStorage.setItem("my-web-note", notebook.value);
        });
    </script>
</body>
</html>
