<div class="section-title">📝 Quick Notes</div>
<div class="notes-container">
    <textarea id="notebook" placeholder="Type your reminders here... (Auto-saves!)"></textarea>
</div>

<style>
    /* Add this to your <style> section */
    .notes-container {
        width: 100%;
        max-width: 800px;
        margin-bottom: 50px;
    }

    #notebook {
        width: 100%;
        height: 150px;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        background: var(--card-bg);
        color: var(--text);
        backdrop-filter: var(--blur);
        font-family: inherit;
        font-size: 1rem;
        resize: vertical; /* Let you pull it longer if needed */
        outline: none;
        box-shadow: var(--shadow);
        box-sizing: border-box;
    }

    #notebook:focus {
        border-color: var(--accent);
    }
</style>

<script>
    // Add this to the bottom of your <script> section
    const notebook = document.getElementById("notebook");

    // Load saved note
    notebook.value = localStorage.getItem("my-web-note") || "";

    // Save note as you type
    notebook.addEventListener("input", () => {
        localStorage.setItem("my-web-note", notebook.value);
    });
</script>
